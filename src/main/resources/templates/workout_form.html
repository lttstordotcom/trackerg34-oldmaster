<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>TrackErg - Add Workout</title>
    <style>
        :root {
            --border: #222;
            --soft: #f5f5f5;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--border);
        }

        .tabs {
            display: flex;
        }

        .tab {
            padding: 10px 14px;
            border-right: 2px solid var(--border);
            text-decoration: none;
            color: #000;
        }

        .tab.active {
            background: var(--soft);
            font-weight: 700;
        }

        .wrap {
            padding: 14px;
            display: flex;
            gap: 16px;
        }

        .left {
            flex: 1 1 700px;
            max-width: 900px;
        }

        .right {
            flex: 1 1 300px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input[type="number"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid var(--border);
            box-sizing: border-box;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        .inline {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .inline .small {
            width: 110px;
        }

        .starBox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .bigBtn {
            border: 2px solid var(--border);
            padding: 14px 22px;
            font-size: 22px;
            background: #fff;
            cursor: pointer;
        }

        .smallBtn {
            border: 2px solid var(--border);
            padding: 6px 10px;
            background: #fff;
            cursor: pointer;
        }

        .normalFields {
            margin-top: 10px;
        }

        .intervals {
            margin-top: 10px;
            padding: 12px;
            border: 2px solid var(--border);
            display: none;
        }

        .intervalRow {
            display: grid;
            grid-template-columns: 1.2fr 1.5fr 1.5fr 1fr auto;
            gap: 10px;
            align-items: end;
            margin-top: 10px;
        }

        .hint {
            font-size: 12px;
            opacity: 0.8;
        }

        @media (max-width: 1100px) {
            .intervalRow {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 900px) {
            .wrap {
                flex-direction: column;
            }

            .right {
                justify-content: flex-start;
            }

            .intervalRow {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="tabs">
        <a class="tab" href="/workouts">View Workouts</a>
        <a class="tab active" href="/workouts/new">Add Workout</a>
        <a class="tab" href="/prs">View PR</a>
    </div>
</div>

<div class="wrap">
    <div class="left">
        <h2 th:text="${mode=='edit'} ? 'Edit Workout' : 'Add Workout'">Add Workout</h2>

        <form method="post"
              th:action="${mode=='edit'} ? @{/workouts/update} : @{/workouts}"
              th:object="${form}">

            <input th:field="*{id}" type="hidden"/>

            <label>Date</label>
            <input required th:field="*{date}" type="date"/>

            <div class="inline" style="margin-top:10px;">
                <label style="margin:0;">Interval</label>
                <input id="intervalToggle" th:field="*{interval}" type="checkbox"/>
            </div>

            <div class="normalFields" id="normalFields">
                <label>Time to complete</label>
                <div class="inline">
                    <input class="small" min="0" placeholder="min" th:field="*{timeMinutes}" type="number"/>
                    <input class="small" min="0" placeholder="sec" th:field="*{timeSeconds}" type="number"/>
                </div>

                <label>Distance</label>
                <input min="0" placeholder="meters" th:field="*{distanceMeters}" type="number"/>

                <label>Stroke rate</label>
                <input min="0" placeholder="spm" th:field="*{strokeRate}" type="number"/>
            </div>

            <label>Notes</label>
            <textarea th:field="*{notes}"></textarea>

            <div class="starBox">
                <div style="font-size:36px;">★</div>
                <label style="margin:0;">Favorite</label>
                <input th:field="*{favorite}" type="checkbox"/>
            </div>

            <div class="intervals" id="intervalsBox">
                <div class="inline" style="justify-content:space-between;">
                    <strong>Intervals</strong>
                    <button class="smallBtn" onclick="addIntervalRow()" type="button">+</button>
                </div>

                <div class="hint">Each interval can include work distance or work time, rest time, and stroke rate.</div>

                <div id="intervalRows"></div>
                <input id="intervalCount" type="hidden" value="0"/>
            </div>

            <div style="margin-top:14px;">
                <button class="bigBtn" type="submit"
                        th:text="${mode=='edit'} ? 'Save Changes' : 'Add Workout +'">
                    Add Workout +
                </button>
            </div>
        </form>
    </div>

    <div class="right">
        <!-- Reserved for future charts or preview content. -->
    </div>
</div>

<script th:inline="javascript">
    const intervalData = /*[[${intervalData}]]*/ null;

    function showIntervals(show) {
        const intervalBox = document.getElementById('intervalsBox');
        const normalFields = document.getElementById('normalFields');

        intervalBox.style.display = show ? 'block' : 'none';
        normalFields.style.display = show ? 'none' : 'block';
    }

    function addIntervalRow(prefill) {
        const rows = document.getElementById('intervalRows');
        const countEl = document.getElementById('intervalCount');
        const idx = parseInt(countEl.value, 10);

        const row = document.createElement('div');
        row.className = 'intervalRow';
        row.dataset.idx = idx;

        row.innerHTML = `
      <div>
        <label>Work distance (m)</label>
        <input type="number" min="0" name="intervals[${idx}].workDistanceMeters" placeholder="e.g., 500"
               value="${prefill?.workDistanceMeters ?? ''}">
      </div>

      <div>
        <label>Work time (min:sec)</label>
        <div class="inline">
          <input class="small" type="number" min="0" name="intervals[${idx}].workMinutes" placeholder="min"
                 value="${prefill ? Math.floor((prefill.workTimeSeconds || 0) / 60) : ''}">
          <input class="small" type="number" min="0" name="intervals[${idx}].workSeconds" placeholder="sec"
                 value="${prefill ? ((prefill.workTimeSeconds || 0) % 60) : ''}">
        </div>
      </div>

      <div>
        <label>Rest (min:sec)</label>
        <div class="inline">
          <input class="small" type="number" min="0" name="intervals[${idx}].restMinutes" placeholder="min"
                 value="${prefill ? Math.floor((prefill.restTimeSeconds || 0) / 60) : ''}">
          <input class="small" type="number" min="0" name="intervals[${idx}].restSeconds" placeholder="sec"
                 value="${prefill ? ((prefill.restTimeSeconds || 0) % 60) : ''}">
        </div>
      </div>

      <div>
        <label>Stroke rate</label>
        <input type="number" min="0" name="intervals[${idx}].strokeRate" placeholder="spm"
               value="${prefill?.strokeRate ?? ''}">
      </div>

      <div>
        <button class="smallBtn" type="button" onclick="removeRow(${idx})">X</button>
      </div>
    `;

        rows.appendChild(row);
        countEl.value = idx + 1;
    }

    function removeRow(idx) {
        const rows = document.getElementById('intervalRows');
        const node = rows.querySelector(`.intervalRow[data-idx="${idx}"]`);

        if (node) {
            node.remove();
            reindexRows();
        }
    }

    function reindexRows() {
        const rows = document.querySelectorAll('#intervalRows .intervalRow');
        const countEl = document.getElementById('intervalCount');

        rows.forEach((row, newIndex) => {
            row.dataset.idx = newIndex;

            const inputs = row.querySelectorAll('input');
            inputs.forEach(input => {
                if (input.name.includes('.workDistanceMeters')) {
                    input.name = `intervals[${newIndex}].workDistanceMeters`;
                } else if (input.name.includes('.workMinutes')) {
                    input.name = `intervals[${newIndex}].workMinutes`;
                } else if (input.name.includes('.workSeconds')) {
                    input.name = `intervals[${newIndex}].workSeconds`;
                } else if (input.name.includes('.restMinutes')) {
                    input.name = `intervals[${newIndex}].restMinutes`;
                } else if (input.name.includes('.restSeconds')) {
                    input.name = `intervals[${newIndex}].restSeconds`;
                } else if (input.name.includes('.strokeRate')) {
                    input.name = `intervals[${newIndex}].strokeRate`;
                }
            });

            const deleteButton = row.querySelector('button.smallBtn');
            if (deleteButton) {
                deleteButton.setAttribute('onclick', `removeRow(${newIndex})`);
            }
        });

        countEl.value = rows.length;
    }

    const toggle = document.getElementById('intervalToggle');

    toggle.addEventListener('change', () => {
        showIntervals(toggle.checked);

        if (toggle.checked && document.getElementById('intervalCount').value === "0") {
            addIntervalRow();
        }
    });

    window.addEventListener('load', () => {
        showIntervals(toggle.checked);

        if (intervalData && Array.isArray(intervalData) && intervalData.length > 0) {
            toggle.checked = true;
            showIntervals(true);
            intervalData.forEach(interval => addIntervalRow(interval));
        } else if (toggle.checked) {
            addIntervalRow();
        }
    });
</script>

</body>
</html>
