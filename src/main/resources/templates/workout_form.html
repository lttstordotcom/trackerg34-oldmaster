<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>TrackErg - Add Workout</title>
    <style>
        :root { --border:#222; --soft:#f5f5f5; }
        body { font-family: Arial, sans-serif; margin:0; }
        .topbar { display:flex; align-items:center; border-bottom:2px solid var(--border); }
        .tabs { display:flex; }
        .tab { padding:10px 14px; border-right:2px solid var(--border); text-decoration:none; color:#000; }
        .tab.active { background: var(--soft); font-weight:700; }
        .wrap { padding: 14px; display:flex; gap:16px; }
        .left { flex: 1 1 420px; max-width: 520px; }
        .right { flex: 1 1 300px; display:flex; justify-content:center; align-items:flex-start; }
        label { display:block; margin-top:10px; }
        input[type="number"], input[type="date"], textarea { width:100%; padding:8px; border:2px solid var(--border); }
        textarea { min-height: 160px; resize: vertical; }
        .inline { display:flex; gap:10px; align-items:center; }
        .inline .small { width:110px; }
        .starBox { display:flex; align-items:center; gap:10px; margin-top:10px; }
        .bigBtn { border:2px solid var(--border); padding:14px 22px; font-size: 22px; background:#fff; cursor:pointer; }
        .smallBtn { border:2px solid var(--border); padding:6px 10px; background:#fff; cursor:pointer; }
        .intervals { margin-top:10px; padding:10px; border:2px solid var(--border); display:none; }
        .intervalRow { display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:8px; align-items:end; margin-top:8px; }
        .hint { font-size: 12px; opacity: 0.8; }
        @media (max-width: 900px) {
            .wrap { flex-direction:column; }
            .right { justify-content:flex-start; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="tabs">
        <a class="tab" href="/workouts">View Workouts</a>
        <a class="tab active" href="/workouts/new">Add Workout</a>
        <a class="tab" href="/prs">View PR</a>
    </div>
</div>

<div class="wrap">
    <div class="left">
        <h2 th:text="${mode=='edit'} ? 'Edit Workout' : 'Add Workout'">Add Workout</h2>

        <form th:object="${form}"
              th:action="${mode=='edit'} ? @{/workouts/update} : @{/workouts}"
              method="post">

            <input type="hidden" th:field="*{id}"/>

            <label>Date</label>
            <input type="date" th:field="*{date}" required/>

            <div class="inline" style="margin-top:10px;">
                <label style="margin:0;">Interval</label>
                <input type="checkbox" th:field="*{interval}" id="intervalToggle"/>
            </div>

            <label>time to complete</label>
            <div class="inline">
                <input class="small" type="number" min="0" placeholder="min" th:field="*{timeMinutes}" />
                <input class="small" type="number" min="0" placeholder="sec" th:field="*{timeSeconds}" />
            </div>

            <label>Distance</label>
            <input type="number" min="0" placeholder="meters" th:field="*{distanceMeters}"/>

            <label>stroke rate</label>
            <input type="number" min="0" placeholder="spm" th:field="*{strokeRate}"/>

            <label>notes</label>
            <textarea th:field="*{notes}"></textarea>

            <div class="starBox">
                <div style="font-size:36px;">★</div>
                <label style="margin:0;">Favorite</label>
                <input type="checkbox" th:field="*{favorite}"/>
            </div>

            <!-- Interval section -->
            <div class="intervals" id="intervalsBox">
                <div class="inline" style="justify-content:space-between;">
                    <strong>Intervals</strong>
                    <button class="smallBtn" type="button" onclick="addIntervalRow()">+</button>
                </div>
                <div class="hint">Fill either work distance OR work time. Rest is optional.</div>

                <div id="intervalRows"></div>

                <!-- Hidden template row index -->
                <input type="hidden" id="intervalCount" value="0"/>
            </div>

            <div style="margin-top:14px;">
                <button class="bigBtn" type="submit">Add Workout +</button>
            </div>
        </form>
    </div>

    <div class="right">
        <!-- empty space in your wireframe; leaving area here for future charts / PR preview -->
    </div>
</div>

<script th:inline="javascript">
    // If we're editing, we may receive intervalData from controller
    const intervalData = /*[[${intervalData}]]*/ null;

    function showIntervals(show) {
        const box = document.getElementById('intervalsBox');
        box.style.display = show ? 'block' : 'none';
    }

    function addIntervalRow(prefill) {
        const rows = document.getElementById('intervalRows');
        const countEl = document.getElementById('intervalCount');
        let idx = parseInt(countEl.value, 10);

        const row = document.createElement('div');
        row.className = 'intervalRow';
        row.dataset.idx = idx;

        row.innerHTML = `
      <div>
        <label>Work distance (m)</label>
        <input type="number" min="0" name="intervals[${idx}].workDistanceMeters" placeholder="e.g., 500"
               value="${prefill?.workDistanceMeters ?? ''}">
      </div>

      <div>
        <label>Work time (min:sec)</label>
        <div class="inline">
          <input class="small" type="number" min="0" name="intervals[${idx}].workMinutes" placeholder="min"
                 value="${prefill ? Math.floor((prefill.workTimeSeconds||0)/60) : ''}">
          <input class="small" type="number" min="0" name="intervals[${idx}].workSeconds" placeholder="sec"
                 value="${prefill ? ((prefill.workTimeSeconds||0)%60) : ''}">
        </div>
      </div>

      <div>
        <label>Rest (min:sec)</label>
        <div class="inline">
          <input class="small" type="number" min="0" name="intervals[${idx}].restMinutes" placeholder="min"
                 value="${prefill ? Math.floor((prefill.restTimeSeconds||0)/60) : ''}">
          <input class="small" type="number" min="0" name="intervals[${idx}].restSeconds" placeholder="sec"
                 value="${prefill ? ((prefill.restTimeSeconds||0)%60) : ''}">
        </div>
      </div>

      <div>
        <button class="smallBtn" type="button" onclick="removeRow(${idx})">X</button>
      </div>
    `;

        rows.appendChild(row);
        idx++;
        countEl.value = idx;
    }

    function removeRow(idx) {
        const rows = document.getElementById('intervalRows');
        const node = rows.querySelector(`[data-idx="${idx}"]`);
        if (node) node.remove();
    }

    // Toggle logic
    const toggle = document.getElementById('intervalToggle');
    toggle.addEventListener('change', () => {
        showIntervals(toggle.checked);
        if (toggle.checked && document.getElementById('intervalCount').value === "0") {
            addIntervalRow();
        }
    });

    // On page load: set interval box if checked OR editing with interval data
    window.addEventListener('load', () => {
        showIntervals(toggle.checked);

        // If editing and we have interval data, render rows
        if (intervalData && Array.isArray(intervalData) && intervalData.length > 0) {
            toggle.checked = true;
            showIntervals(true);
            intervalData.forEach(it => addIntervalRow(it));
        } else if (toggle.checked) {
            addIntervalRow();
        }
    });
</script>

</body>
</html>
