<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>TrackErg - Workouts</title>
    <style>
        :root { --border:#222; --muted:#666; --bg:#fff; --soft:#f5f5f5; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; }
        .topbar { display:flex; align-items:center; border-bottom:2px solid var(--border); }
        .tabs { display:flex; gap:0; }
        .tab { padding:10px 14px; border-right:2px solid var(--border); text-decoration:none; color:#000; }
        .tab.active { background: var(--soft); font-weight:700; }
        .content { padding: 12px; }
        .row { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
        .search { display:flex; align-items:center; gap:8px; flex: 1 1 320px; }
        .search input { width:100%; max-width:520px; padding:8px 10px; border:2px solid var(--border); }
        .controls { display:flex; gap:10px; align-items:center; }
        select { padding:8px 10px; border:2px solid var(--border); background:#fff; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { border:2px solid var(--border); padding:8px; text-align:left; font-size: 14px; }
        th { background: var(--soft); }
        .star-col {font-weight:1200; text-align:center; color:gold;}
        .muted { color:var(--muted); }
        .btn { border:2px solid var(--border); padding:6px 10px; background:#fff; cursor:pointer; text-decoration:none; color:#000; }
        .btn.primary { font-weight:700; }
        .nowrap { white-space:nowrap; }
        th.actions-col {display:none}
        td.actions {border: none;}
        @media (max-width: 720px) {
            th, td { font-size: 12px; }
            .nowrap { white-space:normal; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="tabs">
        <a class="tab active" href="/workouts">View Workouts</a>
        <a class="tab" href="/workouts/new">Add Workout</a>
        <a class="tab" href="/prs">View PR</a>
    </div>
</div>

<div class="content">
    <div class="row">
        <form class="search" method="get" action="/workouts">
            <span aria-hidden="true">🔎</span>
            <input type="text" name="query" placeholder="Search" th:value="${query}"/>
            <input type="hidden" name="sort" th:value="${sort}"/>
            <button class="btn" type="submit">Go</button>
        </form>

        <div class="controls">
            <form method="get" action="/workouts">
                <input type="hidden" name="query" th:value="${query}"/>
                <label class="nowrap">
                    Sort by
                    <select name="sort" onchange="this.form.submit()">
                        <option value="" th:selected="${sort==''}">—</option>
                        <option value="distance" th:selected="${sort=='distance'}">Distance</option>
                        <option value="time" th:selected="${sort=='time'}">Time</option>
                        <option value="split" th:selected="${sort=='split'}">Split</option>
                        <option value="interval" th:selected="${sort=='interval'}">Interval</option>
                        <option value="noninterval" th:selected="${sort=='noninterval'}">Non-Interval</option>
                        <option value="watts" th:selected="${sort=='watts'}">Watts</option>
                        <option value="oldest" th:selected="${sort=='oldest'}">Oldest</option>
                        <option value="newest" th:selected="${sort=='newest'}">Newest</option>
                    </select>
                </label>
            </form>

            <a class="btn primary" href="/workouts/new">Add Workout +</a>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Split</th>
            <th>Distance</th>
            <th>Total time</th>
            <th>Watts</th>
            <th>Intervals</th>
            <th>Notes</th>
            <th class="star-col">★</th>
            <th class="actions-col">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="w : ${workouts}">
            <td th:text="${w.date}">2026-01-01</td>

            <td th:text="${w.splitSeconds > 0 ? #numbers.formatDecimal(w.splitSeconds,0,1) : ''}"
                class="muted"></td>

            <td th:text="${w.distanceMeters > 0 ? w.distanceMeters : ''}"></td>

            <td th:text="${w.timeSeconds > 0 ? (w.timeSeconds/60) + ':' + (#numbers.formatInteger(w.timeSeconds%60,2)) : ''}"></td>

            <td th:text="${w.watts > 0 ? #numbers.formatDecimal(w.watts,0,0) : ''}"></td>

            <td th:text="${w.interval ? 'Yes' : 'No'}"></td>

            <td th:text="${w.notes}"></td>
            <td class="nowrap star-col" th:text="${w.favorite ? '★' : ''}"></td>

            <td class="actions nowrap">
                <a class="btn" th:href="@{'/workouts/edit/' + ${w.id}}">Edit</a>
                <a class="btn" th:href="@{'/workouts/delete/' + ${w.id}}"
                   onclick="return confirm('Delete this workout?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
